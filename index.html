<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>AVIATOR PRO MANUAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0b1220; color:#fff; font-family:Arial; text-align:center; }
#display { font-size:60px; margin:20px; font-weight:bold; }

.box { background:#1e293b; margin:10px; padding:15px; border-radius:10px; }

input { padding:10px; width:140px; font-size:18px; text-align:center; }
button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; }

.green { background:#22c55e; }
.red { background:red; }
</style>
</head>

<body>

<h1>🎯 AVIATOR PRO MANUAL</h1>

<div id="display">1.00x</div>

<div class="box">
💰 Lucro: <span id="lucro">0</span><br>
🎯 Winrate: <span id="winrate">0%</span><br>
🔢 Entradas: <span id="entradas">0</span><br>
💵 Stake: <span id="stake">5</span><br>
⚙️ Status: <span id="status">AGUARDANDO</span>
</div>

<div class="box">
<input 
  type="text" 
  id="entradaReal" 
  placeholder="123 = 1.23x"
  onkeydown="handleKey(event)"
>
</div>

<div class="box">
<button class="green" onclick="win()">WIN</button>
<button class="red" onclick="loss()">LOSS</button>
</div>

<div class="box">
<canvas id="grafico"></canvas>
</div>

<script>
let hist=[], wins=0, losses=0, entradas=0;
let stake=5, base=5, max=12;

let lucro=0;
let cooldown=0, espera=0;

let sinalAtivo=false;

let chart=new Chart(document.getElementById("grafico"),{
 type:'bar',
 data:{labels:[],datasets:[{data:[],backgroundColor:[]}]}
});

function cor(x){
 if(x<2) return "blue";
 if(x<10) return "green";
 return "pink";
}

function prob(){
 if(hist.length<30) return 50;
 let ult=hist.slice(-30);
 return (ult.filter(x=>x>=1.7).length/30)*100;
}

// 🔥 CONVERSÃO INTELIGENTE
function converter(valor){
 let num = valor.replace(/\D/g,''); // só números
 if(num === "") return null;
 return parseInt(num) / 100;
}

function handleKey(e){
 if(e.key === "Enter"){
   inserir();
   entradaReal.value = "";
 }
}

function inserir(){
 let raw = document.getElementById("entradaReal").value;
 let v = converter(raw);

 if(v === null) return;

 hist.push(v);
 if(hist.length>60) hist.shift();

 let p=prob();
 let ult5=hist.slice(-5);

 let baixos=ult5.filter(x=>x<2).length;
 let altos=ult5.filter(x=>x>=2).length;

 let status="AGUARDANDO";
 sinalAtivo=false;

 if(cooldown>0){
   cooldown--;
   status="⏳ COOLDOWN";
 }
 else if(espera>0){
   espera--;
   status="⏸️ ESPERA";
 }
 else if(p>=70 && (baixos>=3 || altos>=2)){
   status="🎯 ENTRAR NA PRÓXIMA RODADA";
   sinalAtivo=true;
   espera=2;
   beep();
 }

 atualizarStatus(status);
 display(v);
 graf(v);
}

function win(){
 if(!sinalAtivo) return;

 entradas++;
 wins++;

 lucro += stake*(1.7-1);
 stake=Math.min(stake+1,max);

 sinalAtivo=false;
 atualizar();
}

function loss(){
 if(!sinalAtivo) return;

 entradas++;
 losses++;

 lucro -= stake;
 stake=base;
 cooldown=3;

 sinalAtivo=false;
 atualizar();
}

function atualizar(){
 let total=wins+losses;
 let wr=total?(wins/total*100).toFixed(1):0;

 document.getElementById("winrate").innerText=wr+"%";
 document.getElementById("entradas").innerText=entradas;
 document.getElementById("stake").innerText=stake;
 document.getElementById("lucro").innerText=lucro.toFixed(2);
}

function display(v){
 let el=document.getElementById("display");
 el.innerText=v.toFixed(2)+"x";
 el.style.color=cor(v);
}

function graf(v){
 chart.data.labels.push("");
 chart.data.datasets[0].data.push(v);
 chart.data.datasets[0].backgroundColor.push(cor(v));

 if(chart.data.labels.length>40){
   chart.data.labels.shift();
   chart.data.datasets[0].data.shift();
   chart.data.datasets[0].backgroundColor.shift();
 }

 chart.update();
}

function atualizarStatus(s){
 document.getElementById("status").innerText=s;
}

function beep(){
 let ctx=new AudioContext();
 let o=ctx.createOscillator();
 o.connect(ctx.destination);
 o.start();
 setTimeout(()=>o.stop(),100);
}

// 🔥 FOCO AUTOMÁTICO
setInterval(()=>{
 document.getElementById("entradaReal").focus();
},1000);
</script>

</body>
</html>
