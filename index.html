<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Aviator SNIPER PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0f172a; color:#fff; font-family:Arial; text-align:center; }
button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
.start { background:#22c55e; }
.stop { background:red; }
.box { background:#1e293b; margin:10px; padding:15px; border-radius:10px; }
.log { max-height:150px; overflow:auto; text-align:left; }
</style>
</head>

<body>

<h1>🎯 SNIPER PRO MAX</h1>

<div class="box">
💰 Saldo: <span id="saldo">100</span><br>
📊 Último: <span id="ultimo">-</span><br>
🎯 Winrate: <span id="winrate">0%</span><br>
📉 Drawdown: <span id="drawdown">0</span><br>
🔢 Entradas: <span id="entradas">0</span><br>
🧠 Probabilidade: <span id="prob">-</span>
</div>

<button class="start" onclick="start()">START</button>
<button class="stop" onclick="stop()">STOP</button>
<button onclick="backtest()">BACKTEST 5000</button>

<div class="box">
<canvas id="grafico"></canvas>
</div>

<div class="box log" id="log"></div>

<script>
let saldo, saldoMax, wins, losses, perdasSeguidas, entradas;
let historico, rodando;

function reset(){
  saldo = 100;
  saldoMax = 100;
  wins = 0;
  losses = 0;
  perdasSeguidas = 0;
  entradas = 0;
  historico = [];
}

reset();

let chart = new Chart(document.getElementById('grafico'), {
  type: 'bar',
  data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] }
});

function gerar(){
  let r = Math.random();
  if (r < 0.5) return 1 + Math.random()*0.5;
  if (r < 0.8) return 1.5 + Math.random()*1.5;
  if (r < 0.95) return 3 + Math.random()*7;
  return 10 + Math.random()*40;
}

function cor(x){
  if(x < 2) return "blue";
  if(x < 10) return "green";
  return "pink";
}

function analisar(){
  if(historico.length < 20) return {score:0, prob:0};

  let ult = historico.slice(-20);

  let baixos = ult.filter(x=>x<2).length;
  let altos = ult.filter(x=>x>=3).length;
  let media = ult.reduce((a,b)=>a+b,0)/20;

  let score = baixos*2 + (2-media)*2 - altos*1.5 - perdasSeguidas*4;

  let prob = Math.min(95, Math.max(50, 50 + score*5));

  return {score, prob};
}

function validar(score){
  let ult = historico.slice(-5);
  let baixosSeq = ult.filter(x=>x<2).length >= 3;
  let poucosAltos = historico.slice(-10).filter(x=>x>=3).length <= 2;
  return score >= 8 && baixosSeq && poucosAltos && perdasSeguidas < 2;
}

function rodada(logar=true){
  let resultado = gerar();
  historico.push(resultado);
  if(historico.length > 60) historico.shift();

  let {score, prob} = analisar();

  let entrar = validar(score);

  if(entrar){
    entradas++;

    if(resultado >= 1.7){
      saldo += 5*(1.7-1);
      wins++;
      perdasSeguidas = 0;
      if(logar) addLog("🟢 WIN "+resultado.toFixed(2));
    } else {
      saldo -= 5;
      losses++;
      perdasSeguidas++;
      if(logar) addLog("🔴 LOSS "+resultado.toFixed(2));
    }
  }

  if(saldo > saldoMax) saldoMax = saldo;
  let drawdown = saldoMax - saldo;

  let total = wins + losses;
  let winrate = total ? (wins/total*100).toFixed(1) : 0;

  document.getElementById("saldo").innerText = saldo.toFixed(2);
  document.getElementById("ultimo").innerText = resultado.toFixed(2)+"x";
  document.getElementById("winrate").innerText = winrate+"%";
  document.getElementById("drawdown").innerText = drawdown.toFixed(2);
  document.getElementById("entradas").innerText = entradas;
  document.getElementById("prob").innerText = prob.toFixed(1)+"%";

  chart.data.labels.push("");
  chart.data.datasets[0].data.push(resultado);
  chart.data.datasets[0].backgroundColor.push(cor(resultado));

  if(chart.data.labels.length > 40){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
    chart.data.datasets[0].backgroundColor.shift();
  }

  chart.update();
}

function addLog(txt){
  let log = document.getElementById("log");
  log.innerHTML = txt + "<br>" + log.innerHTML;
}

function loop(){
  if(!rodando) return;
  rodada();
  setTimeout(loop, 400);
}

function start(){ rodando=true; loop(); }
function stop(){ rodando=false; }

function backtest(){
  reset();

  for(let i=0;i<5000;i++){
    rodada(false);
  }

  let total = wins + losses;
  let winrate = total ? (wins/total*100).toFixed(1) : 0;
  let drawdown = saldoMax - saldo;

  alert(
    "BACKTEST FINALIZADO\n\n"+
    "Saldo: "+saldo.toFixed(2)+"\n"+
    "Winrate: "+winrate+"%\n"+
    "Entradas: "+entradas+"\n"+
    "Drawdown: "+drawdown.toFixed(2)
  );
}
</script>

</body>
</html>
