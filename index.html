<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>AVIATOR PRO FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0b1220; color:#fff; font-family:Arial; text-align:center; }
#display { font-size:60px; margin:20px; font-weight:bold; }

.box { background:#1e293b; margin:10px; padding:15px; border-radius:10px; }
input { padding:8px; width:100px; }
button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; }

.green { background:#22c55e; }
.red { background:red; }
</style>
</head>

<body>

<h1>🔥 AVIATOR PRO FINAL</h1>

<div id="display">1.00x</div>

<div class="box">
💰 Lucro: <span id="lucro">0</span><br>
🏆 Pico: <span id="pico">0</span><br>
📉 Drawdown: <span id="dd">0</span><br>
🎯 Winrate: <span id="winrate">0%</span><br>
🔢 Entradas: <span id="entradas">0</span><br>
💵 Stake: <span id="stake">5</span><br>
⚙️ Status: <span id="status">AGUARDANDO</span>
</div>

<div class="box">
<input type="number" step="0.01" id="entradaReal" placeholder="1.45">
<button onclick="inserir()">Inserir</button>
<button class="green" onclick="entrar()">ENTREI</button>
</div>

<div class="box">
🎯 Stop Gain: <input id="gain" value="50">
🛑 Stop Loss: <input id="loss" value="-20">
</div>

<div class="box">
<canvas id="grafico"></canvas>
</div>

<script>
let hist=[], wins=0, losses=0, entradas=0;
let stake=5, base=5, max=12;

let lucro=0, pico=0, dd=0;

let cooldown=0, espera=0, podeEntrar=false;

let chart=new Chart(document.getElementById("grafico"),{
 type:'bar',
 data:{labels:[],datasets:[{data:[],backgroundColor:[]}]}
});

function cor(x){
 if(x<2) return "blue";
 if(x<10) return "green";
 return "pink";
}

function prob(){
 if(hist.length<30) return 50;
 let ult=hist.slice(-30);
 return (ult.filter(x=>x>=1.7).length/30)*100;
}

function inserir(){
 let v=parseFloat(entradaReal.value);
 if(isNaN(v)) return;

 hist.push(v);
 if(hist.length>60) hist.shift();

 let p=prob();
 let ult5=hist.slice(-5);
 let baixos=ult5.filter(x=>x<2).length;
 let altos=ult5.filter(x=>x>=2).length;

 let status="AGUARDANDO";

 if(cooldown>0){cooldown--;status="⏳";}
 else if(espera>0){espera--;status="⏸️";}
 else if(p>=70 && (baixos>=3||altos>=2)){
   status="🎯 SNIPER";
   podeEntrar=true;
   espera=2;
   beep();
 } else podeEntrar=false;

 statusSpan(status);
 display(v);
 graf(v);
}

function entrar(){
 if(!podeEntrar) return;

 entradas++;
 let last=hist[hist.length-1];

 if(last>=1.7){
   wins++;
   lucro += stake*(1.7-1);
   stake=Math.min(stake+1,max);
 } else {
   losses++;
   lucro -= stake;
   stake=base;
   cooldown=3;
 }

 podeEntrar=false;

 atualizar();
 checarStops();
}

function atualizar(){
 let total=wins+losses;
 let wr=total?(wins/total*100).toFixed(1):0;

 if(lucro>pico) pico=lucro;
 dd=pico-lucro;

 winrate.innerText=wr+"%";
 entradasSpan.innerText=entradas;
 stakeSpan.innerText=stake;
 lucroSpan.innerText=lucro.toFixed(2);
 picoSpan.innerText=pico.toFixed(2);
 ddSpan.innerText=dd.toFixed(2);
}

function checarStops(){
 let gain=parseFloat(document.getElementById("gain").value);
 let loss=parseFloat(document.getElementById("loss").value);

 if(lucro>=gain){
   alert("META BATIDA 🔥");
   podeEntrar=false;
 }

 if(lucro<=loss){
   alert("STOP LOSS ❌");
   podeEntrar=false;
 }
}

function display(v){
 displayEl.innerText=v.toFixed(2)+"x";
 displayEl.style.color=cor(v);
}

function graf(v){
 chart.data.labels.push("");
 chart.data.datasets[0].data.push(v);
 chart.data.datasets[0].backgroundColor.push(cor(v));

 if(chart.data.labels.length>40){
   chart.data.labels.shift();
   chart.data.datasets[0].data.shift();
   chart.data.datasets[0].backgroundColor.shift();
 }

 chart.update();
}

function statusSpan(s){status.innerText=s;}

function beep(){
 let ctx=new AudioContext();
 let o=ctx.createOscillator();
 o.connect(ctx.destination);
 o.start();
 setTimeout(()=>o.stop(),100);
}

const displayEl=document.getElementById("display");
const status=document.getElementById("status");
const winrate=document.getElementById("winrate");
const entradasSpan=document.getElementById("entradas");
const stakeSpan=document.getElementById("stake");
const lucroSpan=document.getElementById("lucro");
const picoSpan=document.getElementById("pico");
const ddSpan=document.getElementById("dd");
</script>

</body>
</html>
