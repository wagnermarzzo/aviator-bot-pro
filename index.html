<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Aviator Ultra PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0f172a; color:#fff; font-family:Arial; text-align:center; }
button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
.start { background:#22c55e; }
.stop { background:red; }
.box { background:#1e293b; margin:10px; padding:15px; border-radius:10px; }
</style>
</head>

<body>

<h1>🚀 Aviator Ultra IA</h1>

<div class="box">
💰 Saldo: <span id="saldo">100</span><br>
📊 Último: <span id="ultimo">-</span><br>
🎯 Winrate: <span id="winrate">0%</span><br>
⚙️ Limite IA: <span id="limite">6</span>
</div>

<button class="start" onclick="start()">START</button>
<button class="stop" onclick="stop()">STOP</button>
<button onclick="backtest()">BACKTEST 3000</button>

<div class="box">
<canvas id="grafico"></canvas>
</div>

<script>
let saldo = 100;
let aposta = 5;
let meta = 1.7;

let historico = [];
let cores = [];

let wins = 0;
let losses = 0;
let perdasSeguidas = 0;

let limite = 6;
let rodando = false;

let chart = new Chart(document.getElementById('grafico'), {
  type: 'bar',
  data: {
    labels: [],
    datasets: [{
      label: 'Multiplicador',
      data: [],
      backgroundColor: []
    }]
  },
  options: {
    scales: {
      y: {
        beginAtZero: true
      }
    }
  }
});

function gerar() {
  let r = Math.random();
  if (r < 0.5) return 1 + Math.random()*0.5;
  if (r < 0.8) return 1.5 + Math.random()*1.5;
  if (r < 0.95) return 3 + Math.random()*7;
  return 10 + Math.random()*40;
}

function corMultiplicador(x){
  if (x < 2) return "blue";
  if (x < 10) return "green";
  return "pink";
}

function scoreCalc() {
  if (historico.length < 15) return 0;

  let ult = historico.slice(-15);

  let baixos = ult.filter(x=>x<2).length;
  let media = ult.reduce((a,b)=>a+b,0)/15;

  let score = 0;

  score += baixos * 1.5;
  score += (2 - media);
  score -= perdasSeguidas * 3;

  return score;
}

function ajustarIA() {
  let total = wins + losses;
  if (total < 30) return;

  let winrate = wins / total;

  if (winrate < 0.5) limite += 0.5;
  if (winrate > 0.7) limite -= 0.4;

  if (limite < 5) limite = 5;
  if (limite > 12) limite = 12;
}

function rodada() {
  let resultado = gerar();
  historico.push(resultado);
  if (historico.length > 50) historico.shift();

  let score = scoreCalc();
  let entrar = score >= limite;

  if (entrar) {
    if (resultado >= meta) {
      saldo += aposta * (meta - 1);
      wins++;
      perdasSeguidas = 0;
    } else {
      saldo -= aposta;
      losses++;
      perdasSeguidas++;
    }
  }

  ajustarIA();

  let total = wins + losses;
  let winrate = total > 0 ? (wins/total*100).toFixed(1) : 0;

  document.getElementById("saldo").innerText = saldo.toFixed(2);
  document.getElementById("ultimo").innerText = resultado.toFixed(2)+"x";
  document.getElementById("winrate").innerText = winrate+"%";
  document.getElementById("limite").innerText = limite.toFixed(2);

  // gráfico bonito
  chart.data.labels.push("");
  chart.data.datasets[0].data.push(resultado.toFixed(2));
  chart.data.datasets[0].backgroundColor.push(corMultiplicador(resultado));

  if (chart.data.labels.length > 40){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
    chart.data.datasets[0].backgroundColor.shift();
  }

  chart.update();
}

function loop(){
  if(!rodando) return;
  rodada();
  setTimeout(loop, 400);
}

function start(){ rodando = true; loop(); }
function stop(){ rodando = false; }

function backtest(){
  saldo = 100;
  wins = 0;
  losses = 0;
  limite = 6;
  historico = [];

  chart.data.labels = [];
  chart.data.datasets[0].data = [];
  chart.data.datasets[0].backgroundColor = [];

  for(let i=0;i<3000;i++){
    rodada();
  }

  alert("Saldo final: "+saldo.toFixed(2));
}
</script>

</body>
</html>
