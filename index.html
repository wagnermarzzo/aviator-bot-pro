<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Aviator IA FINAL OTIMIZADA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0b1220; color:#fff; font-family:Arial; text-align:center; }
#display { font-size:60px; margin:20px; font-weight:bold; }

button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
.start { background:#22c55e; }
.stop { background:red; }

.box { background:#1e293b; margin:10px; padding:15px; border-radius:10px; }
.log { max-height:150px; overflow:auto; text-align:left; }
</style>
</head>

<body>

<h1>🎯 AVIATOR IA FINAL OTIMIZADA</h1>

<div id="display">1.00x</div>

<div class="box">
💰 Saldo: <span id="saldo">100</span><br>
🎯 Winrate: <span id="winrate">0%</span><br>
📉 Drawdown: <span id="drawdown">0</span><br>
🔢 Entradas: <span id="entradas">0</span><br>
🧠 Probabilidade: <span id="prob">-</span><br>
📊 Estratégia: <span id="estrategia">-</span><br>
⚙️ Status: <span id="status">AGUARDANDO</span>
</div>

<button class="start" onclick="start()">START</button>
<button class="stop" onclick="stop()">STOP</button>
<button onclick="backtest()">BACKTEST 8000</button>

<div class="box">
<canvas id="grafico"></canvas>
</div>

<div class="box log" id="log"></div>

<script>
let saldo, saldoMax, wins, losses, perdasSeguidas, entradas;
let historico, rodando;
let gale = 0;

function reset(){
  saldo = 100;
  saldoMax = 100;
  wins = 0;
  losses = 0;
  perdasSeguidas = 0;
  entradas = 0;
  historico = [];
  gale = 0;
}

reset();

let chart = new Chart(document.getElementById('grafico'), {
  type: 'bar',
  data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] }
});

function gerar(){
  let r = Math.random();
  if (r < 0.5) return 1 + Math.random()*0.5;
  if (r < 0.8) return 1.5 + Math.random()*1.5;
  if (r < 0.95) return 3 + Math.random()*7;
  return 10 + Math.random()*40;
}

function cor(x){
  if(x < 2) return "blue";
  if(x < 10) return "green";
  return "pink";
}

function probReal(){
  if(historico.length < 30) return 50;
  let ult = historico.slice(-30);
  let ganhos = ult.filter(x=>x >= 1.7).length;
  return (ganhos / 30) * 100;
}

function estrategiaReversao(){
  let ult = historico.slice(-10);
  let baixos = ult.filter(x=>x<2).length;
  return baixos >= 5 ? 70 : 45;
}

function estrategiaContinuidade(){
  let ult = historico.slice(-5);
  let media = ult.reduce((a,b)=>a+b,0)/5;
  return media >= 1.8 ? 65 : 50;
}

function estrategiaScalp(){
  let ult = historico.slice(-15);
  let mid = ult.filter(x=>x>=1.5 && x<=2).length;
  return (mid/15)*100;
}

function escolherEstrategia(){
  let r = estrategiaReversao();
  let c = estrategiaContinuidade();
  let s = estrategiaScalp();

  let max = Math.max(r,c,s);

  if(max == r) return {nome:"Reversão", prob:r};
  if(max == c) return {nome:"Continuidade", prob:c};
  return {nome:"Scalp", prob:s};
}

function rodada(logar=true){
  let resultado = gerar();
  historico.push(resultado);
  if(historico.length > 60) historico.shift();

  let probBase = probReal();
  let estrategia = escolherEstrategia();
  let probFinal = (probBase + estrategia.prob) / 2;

  let entrar = false;
  let status = "AGUARDANDO";

  let ult = historico.slice(-5);
  let padraoOK = ult.filter(x => x < 2).length >= 1;

  let bloqueado = perdasSeguidas >= 2;

  if(bloqueado){
    entrar = false;
    gale = 0;
    status = "⛔ BLOQUEADO (2 LOSSES)";
  }
  else if(probFinal >= 75){
    entrar = true;
    status = "🔥 SUPER ENTRADA";
  }
  else if(probFinal >= 62 && padraoOK){
    entrar = true;
    status = "ENTRADA";
  }

  let valorBase = 5;
  let valorAposta = gale == 1 ? valorBase * 2 : valorBase;

  if(entrar){
    entradas++;

    if(resultado >= 1.7){
      saldo += valorAposta * (1.7 - 1);
      wins++;
      perdasSeguidas = 0;
      gale = 0;

      if(logar) addLog("🟢 "+estrategia.nome+" WIN "+valorAposta+" ("+resultado.toFixed(2)+"x)");
    } 
    else {
      saldo -= valorAposta;
      losses++;
      perdasSeguidas++;

      // GALE SOMENTE EM SUPER ENTRADA
      if(gale == 0 && probFinal >= 75){
        gale = 1;
        if(logar) addLog("⚠️ GALE ATIVADO (FORTE)");
      } else {
        gale = 0;
        if(logar) addLog("🔴 LOSS FINAL");
      }
    }
  }

  if(saldo > saldoMax) saldoMax = saldo;
  let drawdown = saldoMax - saldo;

  let total = wins + losses;
  let winrate = total ? (wins/total*100).toFixed(1) : 0;

  document.getElementById("saldo").innerText = saldo.toFixed(2);
  document.getElementById("winrate").innerText = winrate+"%";
  document.getElementById("drawdown").innerText = drawdown.toFixed(2);
  document.getElementById("entradas").innerText = entradas;
  document.getElementById("prob").innerText = probFinal.toFixed(1)+"%";
  document.getElementById("estrategia").innerText = estrategia.nome;
  document.getElementById("status").innerText = status;

  let disp = document.getElementById("display");
  disp.innerText = resultado.toFixed(2)+"x";
  disp.style.color = cor(resultado);

  chart.data.labels.push("");
  chart.data.datasets[0].data.push(resultado);
  chart.data.datasets[0].backgroundColor.push(cor(resultado));

  if(chart.data.labels.length > 40){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
    chart.data.datasets[0].backgroundColor.shift();
  }

  if(logar){
    chart.update();
  }
}

function addLog(txt){
  let log = document.getElementById("log");
  log.innerHTML = txt + "<br>" + log.innerHTML;
}

function loop(){
  if(!rodando) return;
  rodada(true);
  setTimeout(loop, 350);
}

function start(){ rodando=true; loop(); }
function stop(){ rodando=false; }

async function backtest(){
  reset();

  let totalRodadas = 8000;
  let bloco = 200;

  for(let i = 0; i < totalRodadas; i += bloco){

    for(let j = 0; j < bloco; j++){
      rodada(false);
    }

    document.getElementById("status").innerText =
      "Backtest: " + Math.min(i+bloco, totalRodadas) + "/" + totalRodadas;

    await new Promise(r => setTimeout(r, 0));
  }

  let total = wins + losses;
  let winrate = total ? (wins/total*100).toFixed(1) : 0;
  let drawdown = saldoMax - saldo;

  alert(
    "RESULTADO FINAL\n\n"+
    "Saldo: "+saldo.toFixed(2)+"\n"+
    "Winrate: "+winrate+"%\n"+
    "Entradas: "+entradas+"\n"+
    "Drawdown: "+drawdown.toFixed(2)
  );

  document.getElementById("status").innerText = "FINALIZADO";
}
</script>

</body>
</html>
