<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>AVIATOR SNIPER REAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0b1220; color:#fff; font-family:Arial; text-align:center; }
#display { font-size:60px; margin:20px; font-weight:bold; }
.box { background:#1e293b; margin:10px; padding:15px; border-radius:10px; }
button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
.start { background:#22c55e; }
.stop { background:red; }
</style>
</head>

<body>

<h1>🎯 MODO SNIPER REAL</h1>

<div id="display">1.00x</div>

<div class="box">
💰 Saldo: <span id="saldo">100</span><br>
🎯 Winrate: <span id="winrate">0%</span><br>
📉 Drawdown: <span id="drawdown">0</span><br>
🔢 Entradas: <span id="entradas">0</span><br>
⚙️ Status: <span id="status">AGUARDANDO</span>
</div>

<button class="start" onclick="start()">START</button>
<button class="stop" onclick="stop()">STOP</button>
<button onclick="backtest()">BACKTEST</button>

<div class="box">
<canvas id="grafico"></canvas>
</div>

<script>
let saldo, saldoMax, wins, losses, entradas;
let historico, rodando;
let gale = 0;
let cooldown = 0;
let espera = 0;

function reset(){
  saldo = 100;
  saldoMax = 100;
  wins = 0;
  losses = 0;
  entradas = 0;
  historico = [];
  gale = 0;
  cooldown = 0;
  espera = 0;
}
reset();

let chart = new Chart(document.getElementById('grafico'), {
  type: 'bar',
  data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] }
});

function gerar(){
  let r = Math.random();
  if (r < 0.5) return 1 + Math.random()*0.5;
  if (r < 0.8) return 1.5 + Math.random()*1.5;
  if (r < 0.95) return 3 + Math.random()*7;
  return 10 + Math.random()*40;
}

function cor(x){
  if(x < 2) return "blue";
  if(x < 10) return "green";
  return "pink";
}

function probReal(){
  if(historico.length < 30) return 50;
  let ult = historico.slice(-30);
  let ganhos = ult.filter(x=>x >= 1.7).length;
  return (ganhos / 30) * 100;
}

function rodada(){
  let resultado = gerar();
  historico.push(resultado);
  if(historico.length > 60) historico.shift();

  let prob = probReal();
  let ult5 = historico.slice(-5);

  let baixos = ult5.filter(x=>x < 2).length;
  let altos = ult5.filter(x=>x >= 2).length;

  let padraoExtremo = (baixos >= 4) || (altos >= 2);

  let entrar = false;
  let status = "AGUARDANDO";

  if(cooldown > 0){
    cooldown--;
    status = "⏳ COOLDOWN";
  }
  else if(espera > 0){
    espera--;
    status = "⏸️ ESPERA";
  }
  else if(prob >= 75 && padraoExtremo){
    entrar = true;
    status = "🎯 SNIPER";
    espera = 3;
  }

  let valor = gale ? 10 : 5;

  if(entrar){
    entradas++;

    if(resultado >= 1.7){
      saldo += valor*(1.7-1);
      wins++;
      gale = 0;
      cooldown = 0;
    } else {
      saldo -= valor;
      losses++;

      if(!gale){
        gale = 1;
      } else {
        gale = 0;
        cooldown = 5;
      }
    }
  }

  if(saldo > saldoMax) saldoMax = saldo;
  let drawdown = saldoMax - saldo;

  let total = wins + losses;
  let winrate = total ? (wins/total*100).toFixed(1) : 0;

  document.getElementById("saldo").innerText = saldo.toFixed(2);
  document.getElementById("winrate").innerText = winrate+"%";
  document.getElementById("drawdown").innerText = drawdown.toFixed(2);
  document.getElementById("entradas").innerText = entradas;
  document.getElementById("status").innerText = status;

  document.getElementById("display").innerText = resultado.toFixed(2)+"x";

  chart.data.labels.push("");
  chart.data.datasets[0].data.push(resultado);
  chart.data.datasets[0].backgroundColor.push(cor(resultado));

  if(chart.data.labels.length > 40){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
    chart.data.datasets[0].backgroundColor.shift();
  }

  chart.update();
}

function loop(){
  if(!rodando) return;
  rodada();
  setTimeout(loop, 400);
}

function start(){ rodando=true; loop(); }
function stop(){ rodando=false; }

function backtest(){
  reset();
  for(let i=0;i<5000;i++) rodada();

  alert("Saldo: "+saldo.toFixed(2));
}
</script>

</body>
</html>
